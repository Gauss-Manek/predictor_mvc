<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Predictor App - Interface</title>
</head>
<body>
    <h1>Application de Prédiction</h1>

    <section>
        <h2>Connexion</h2>
        <input type="text" id="username" placeholder="Nom d'utilisateur">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="login()">Se connecter</button>
    </section>
    <hr>
    <section>
        <h2>Prédiction</h2>
        <input type="text" id="data_input" placeholder="Entrez vos données">
        <button onclick="getPrediction()">Prédire</button>
        <p id="result"></p>
    </section>
    <script src="app.js"></script>
</body>
</html>
